name: Update Match Data

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch: # Support manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch match data
        run: npm run fetch-data
        env:
          PANDASCORE_ACCESS_TOKEN: ${{ secrets.PANDASCORE_ACCESS_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/matches.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update match data [skip ci]"
            git push
          fi
